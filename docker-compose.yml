version: "3.8"

services:

  nginx:
    build: ./nginx
    container_name: nginx_cont
    ports:
      - "80:80"
    depends_on:
      - django_app
    restart: always
    networks:
      - notes-app-nw

  django_app:
    build: .
    container_name: django_cont
    command: >
      sh -c "
      echo 'Waiting for DB...' &&
      sleep 15 &&
      python manage.py migrate --noinput &&
      gunicorn notesapp.wsgi:application --bind 0.0.0.0:8000
      "
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    ports:
      - "8000:8000"
    networks:
      - notes-app-nw

  db:
    image: mysql:8
    container_name: db_cont
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notes   # ✅ match your app
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notes-app-nw

volumes:
  mysql_data:

networks:
  notes-app-nw:
